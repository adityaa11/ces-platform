name: CES repository tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  repository-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm check
      - run: docker build -t ces-cli:local .
      - run: docker run --rm ces-cli:local --help
